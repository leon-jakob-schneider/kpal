name: Publish To Maven Central

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish"
        required: true

jobs:
  publish:
    runs-on: macos-latest
    permissions:
      contents: read

    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      SONATYPE_B64: ${{ secrets.SONATYPE_B64 }}

    steps:
      - name: Check out sources
        uses: actions/checkout@v5

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "RELEASE_VERSION=${VERSION}" >> "${GITHUB_ENV}"

      - name: Validate publishing secrets
        run: |
          test -n "${SONATYPE_B64}" || { echo "Missing SONATYPE_B64 secret"; exit 1; }
          test -n "${GPG_PRIVATE_KEY}" || { echo "Missing GPG_PRIVATE_KEY secret"; exit 1; }
          test -n "${GPG_PASSPHRASE}" || { echo "Missing GPG_PASSPHRASE secret"; exit 1; }

      - name: Normalize Sonatype auth header
        run: |
          SONATYPE_AUTH_BEARER="$(
            ruby -rbase64 -e 'raw = ENV.fetch("SONATYPE_B64", ""); user_b64, pass_b64 = raw.split(":", 2); abort("SONATYPE_B64 must use the format b64username:b64password") if user_b64.nil? || pass_b64.nil? || pass_b64.empty?; user = Base64.strict_decode64(user_b64); pass = Base64.strict_decode64(pass_b64); print Base64.strict_encode64("#{user}:#{pass}")'
          )"

          test -n "${SONATYPE_AUTH_BEARER}" || { echo "Failed to build Sonatype auth header"; exit 1; }
          echo "SONATYPE_AUTH_BEARER=${SONATYPE_AUTH_BEARER}" >> "${GITHUB_ENV}"

      - name: Build Central bundle
        working-directory: publishing
        run: ./gradlew --no-daemon prepareCentralBundle -PreleaseVersion="${RELEASE_VERSION}"

      - name: Upload Central bundle
        working-directory: publishing
        run: |
          DEPLOYMENT_ID="$(
            curl --fail --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${SONATYPE_AUTH_BEARER}" \
              --form bundle=@build/central-bundle/central-bundle.zip \
              "https://central.sonatype.com/api/v1/publisher/upload?name=kpal-${RELEASE_VERSION}&publishingType=AUTOMATIC"
          )"

          echo "DEPLOYMENT_ID=${DEPLOYMENT_ID}" >> "${GITHUB_ENV}"

      - name: Wait for Central publication
        run: |
          for _ in $(seq 1 60); do
            RESPONSE="$(
              curl --fail --silent --show-error \
                --request POST \
                --header "Authorization: Bearer ${SONATYPE_AUTH_BEARER}" \
                "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}"
            )"

            echo "${RESPONSE}"

            STATE="$(printf '%s' "${RESPONSE}" | ruby -rjson -e 'print JSON.parse(STDIN.read)["deploymentState"]')"

            case "${STATE}" in
              PUBLISHED)
                exit 0
                ;;
              FAILED)
                exit 1
                ;;
            esac

            sleep 20
          done

          echo "Timed out waiting for Central publication"
          exit 1
